<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 560" width="512" height="560">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3D8BAD"/>
      <stop offset="100%" stop-color="#1E4D63"/>
    </linearGradient>
    <linearGradient id="lockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D0E2EA"/>
    </linearGradient>
  </defs>

  <!-- Shield -->
  <path d="
    M256 24
    L72 72
    L72 240
    C72 368 256 488 256 488
    C256 488 440 368 440 240
    L440 72
    Z
  " fill="url(#shieldGrad)" stroke="#152F3D" stroke-width="10" stroke-linejoin="round"/>

  <!-- Inner shield border -->
  <path d="
    M256 50
    L98 92
    L98 238
    C98 350 256 458 256 458
    C256 458 414 350 414 238
    L414 92
    Z
  " fill="none" stroke="#5EAAC8" stroke-width="1.5" opacity="0.3"/>

  <!-- Lock shackle -->
  <path d="
    M206 215
    L206 168
    C206 122 226 96 256 96
    C286 96 306 122 306 168
    L306 215
  " fill="none" stroke="url(#lockGrad)" stroke-width="18" stroke-linecap="round"/>

  <!-- Lock body -->
  <rect x="186" y="215" width="140" height="108" rx="14" fill="url(#lockGrad)"/>

  <!-- "pg" text inside lock body -->
  <text x="256" y="290" text-anchor="middle" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Menlo', monospace" font-size="64" font-weight="800" fill="#1E4D63" letter-spacing="-1">pg</text>

  <!-- Keyhole dot below text -->
  <circle cx="256" cy="308" r="4.5" fill="#1E4D63" opacity="0.2"/>

  <!-- "harden" text below shield -->
  <text x="256" y="538" text-anchor="middle" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Menlo', monospace" font-size="48" font-weight="700" fill="#1E4D63" letter-spacing="6">harden</text>
</svg>
